apply plugin: "com.android.application"
apply plugin: "com.facebook.react"

react {
    /* The root of your React Native project. */
    root = file("../../")
    /* The folder where the RN JS entry is. */
    reactNativeDir = file("../../node_modules/react-native")
    hermesCommand = "$rootDir/node_modules/react-native/sdks/hermesc/%OS-BIN%/hermesc"
    debuggableVariants = ["debug"]
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.cryptochat"

    defaultConfig {
        applicationId "com.cryptochat"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 7
        versionName "0.7.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            // Set via environment variables or local.properties for CI
            if (project.hasProperty('RELEASE_STORE_FILE')) {
                storeFile     file(RELEASE_STORE_FILE)
                storePassword RELEASE_STORE_PASSWORD
                keyAlias      RELEASE_KEY_ALIAS
                keyPassword   RELEASE_KEY_PASSWORD
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // Foreground service notification support
    implementation "androidx.core:core:1.12.0"

    // Clipboard access
    implementation "androidx.appcompat:appcompat:1.6.1"
}
